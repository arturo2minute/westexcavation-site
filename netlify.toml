# Basic security headers and SPA-friendly redirects
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"


# Prevent cached thank-you pages after form submission.
[[headers]]
for = "/thanks.html"
[headers.values]
Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
Pragma = "no-cache"


# Redirect non-file paths to index if you later convert to an SPA
# [[redirects]]
# from = "/*"
# to = "/index.html"
# status = 200

# Keep the apex domain canonical and redirect www to it once both domains are connected in Netlify.
[[redirects]]
from = "https://www.westexcavation.com/*"
to = "https://westexcavation.com/:splat"
status = 301
force = true
